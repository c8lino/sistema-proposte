<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Proposte</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .admin-login {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .admin-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .admin-link:hover {
            text-decoration: underline;
        }

        .proposals-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .proposal-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .proposal-card h3 {
            color: #374151;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .proposal-card p {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .proposal-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 12px;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home'); // 'home', 'form', 'admin'
            const [proposals, setProposals] = useState([]);
            const [formData, setFormData] = useState({ name: '', message: '' });
            const [showSuccess, setShowSuccess] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);

            // Password admin (in produzione usare autenticazione vera)
            const ADMIN_PASSWORD = 'admin123';

            // Carica proposte da storage
            useEffect(() => {
                loadProposals();
            }, []);

            const loadProposals = async () => {
                try {
                    const result = await window.storage.get('proposals');
                    if (result && result.value) {
                        setProposals(JSON.parse(result.value));
                    }
                } catch (error) {
                    console.log('Nessuna proposta salvata ancora');
                }
            };

            const saveProposals = async (newProposals) => {
                try {
                    await window.storage.set('proposals', JSON.stringify(newProposals));
                } catch (error) {
                    console.error('Errore salvataggio:', error);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                const newProposal = {
                    id: Date.now(),
                    name: formData.name,
                    message: formData.message,
                    date: new Date().toLocaleString('it-IT')
                };

                const updatedProposals = [newProposal, ...proposals];
                setProposals(updatedProposals);
                await saveProposals(updatedProposals);

                setFormData({ name: '', message: '' });
                setShowSuccess(true);
                
                setTimeout(() => {
                    setShowSuccess(false);
                    setView('home');
                }, 2000);
            };

            const handleDelete = async (id) => {
                const updatedProposals = proposals.filter(p => p.id !== id);
                setProposals(updatedProposals);
                await saveProposals(updatedProposals);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setView('admin');
                } else {
                    alert('Password errata');
                }
            };

            // HOME VIEW
            if (view === 'home') {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>💡 Le tue idee contano!</h1>
                            <p>Aiutaci a migliorare il nostro lavoro</p>
                        </div>
                        <div className="content">
                            <button 
                                className="btn btn-primary"
                                onClick={() => setView('form')}
                            >
                                Dicci la tua!
                            </button>
                            <div className="admin-login">
                                <a 
                                    href="#" 
                                    className="admin-link"
                                    onClick={(e) => {
                                        e.preventDefault();
                                        setView('adminLogin');
                                    }}
                                >
                                    Area Admin
                                </a>
                            </div>
                        </div>
                    </div>
                );
            }

            // FORM VIEW
            if (view === 'form') {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>📝 Invia la tua proposta</h1>
                            <p>Ogni suggerimento è prezioso</p>
                        </div>
                        <div className="content">
                            {showSuccess && (
                                <div className="success-message">
                                    ✅ Proposta inviata con successo!
                                </div>
                            )}
                            <form onSubmit={handleSubmit}>
                                <div className="form-group">
                                    <label>Il tuo nome (opzionale)</label>
                                    <input 
                                        type="text"
                                        placeholder="Es: Mario Rossi"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>La tua proposta *</label>
                                    <textarea 
                                        placeholder="Descrivi la tua idea o suggerimento..."
                                        value={formData.message}
                                        onChange={(e) => setFormData({...formData, message: e.target.value})}
                                        required
                                    />
                                </div>
                                <button type="submit" className="btn btn-primary">
                                    Invia proposta
                                </button>
                                <button 
                                    type="button"
                                    className="btn btn-secondary"
                                    onClick={() => setView('home')}
                                >
                                    Annulla
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ADMIN LOGIN VIEW
            if (view === 'adminLogin') {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>🔐 Login Admin</h1>
                            <p>Accedi per vedere le proposte</p>
                        </div>
                        <div className="content">
                            <form onSubmit={handleAdminLogin}>
                                <div className="form-group">
                                    <label>Password</label>
                                    <input 
                                        type="password"
                                        placeholder="Inserisci password"
                                        value={adminPassword}
                                        onChange={(e) => setAdminPassword(e.target.value)}
                                        required
                                    />
                                    <p style={{fontSize: '12px', color: '#6b7280', marginTop: '8px'}}>
                                        Password demo: admin123
                                    </p>
                                </div>
                                <button type="submit" className="btn btn-primary">
                                    Accedi
                                </button>
                                <button 
                                    type="button"
                                    className="btn btn-secondary"
                                    onClick={() => setView('home')}
                                >
                                    Indietro
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ADMIN VIEW
            if (view === 'admin' && isAdmin) {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>📊 Pannello Admin</h1>
                            <p>{proposals.length} proposte ricevute</p>
                        </div>
                        <div className="content">
                            {proposals.length === 0 ? (
                                <div className="empty-state">
                                    <p>Nessuna proposta ancora ricevuta</p>
                                </div>
                            ) : (
                                <div className="proposals-list">
                                    {proposals.map((proposal) => (
                                        <div key={proposal.id} className="proposal-card">
                                            <div className="badge">Nuova proposta</div>
                                            <h3>{proposal.name || 'Anonimo'}</h3>
                                            <p>{proposal.message}</p>
                                            <div className="proposal-meta">
                                                <span>{proposal.date}</span>
                                                <button 
                                                    className="delete-btn"
                                                    onClick={() => handleDelete(proposal.id)}
                                                >
                                                    Elimina
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <button 
                                className="btn btn-secondary"
                                onClick={() => {
                                    setView('home');
                                    setIsAdmin(false);
                                    setAdminPassword('');
                                }}
                                style={{marginTop: '20px'}}
                            >
                                Esci
                            </button>
                        </div>
                    </div>
                );
            }
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
